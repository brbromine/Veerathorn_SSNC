name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ssnc-hello-world

jobs:
  # ── Job 1: Build & push Docker image to ECR ──────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_url: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build, tag & push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$PROJECT_NAME:$IMAGE_TAG ./app
          docker tag $ECR_REGISTRY/$PROJECT_NAME:$IMAGE_TAG $ECR_REGISTRY/$PROJECT_NAME:latest
          docker push $ECR_REGISTRY/$PROJECT_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$PROJECT_NAME:latest
          echo "Pushed image: $ECR_REGISTRY/$PROJECT_NAME:$IMAGE_TAG"

  # ── Job 2: Terraform apply ────────────────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Copy tfvars
        run: cp terraform.tfvars.example terraform.tfvars

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output ALB URL
        run: terraform output alb_dns_name

  # ── Job 3: Integration / health check test ────────────────────────────────────
  integration-test:
    name: Integration Health Check
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ALB DNS name
        id: alb
        working-directory: terraform
        run: |
          cp terraform.tfvars.example terraform.tfvars
          terraform init -reconfigure
          ALB_URL=$(terraform output -raw alb_dns_name)
          echo "url=$ALB_URL" >> $GITHUB_OUTPUT

      - name: Wait for ECS service to stabilise
        run: sleep 60

      - name: Run health check
        run: |
          chmod +x tests/health_check.sh
          ./tests/health_check.sh ${{ steps.alb.outputs.url }}
