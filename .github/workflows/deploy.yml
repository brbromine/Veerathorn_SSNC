name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ssnc-hello-world

jobs:
  # ── Job 1: Terraform apply (creates ECR + all infra) ─────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Copy tfvars
        run: cp terraform.tfvars.example terraform.tfvars

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output ALB URL
        run: terraform output alb_dns_name

  # ── Job 2: Build & push Docker image to ECR (after ECR repo exists) ───────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$PROJECT_NAME:$IMAGE_TAG ./app
          docker tag $ECR_REGISTRY/$PROJECT_NAME:$IMAGE_TAG $ECR_REGISTRY/$PROJECT_NAME:latest
          docker push $ECR_REGISTRY/$PROJECT_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$PROJECT_NAME:latest
          echo "Pushed image: $ECR_REGISTRY/$PROJECT_NAME:$IMAGE_TAG"

      - name: Force ECS service to redeploy with new image
        run: |
          aws ecs update-service \
            --cluster $PROJECT_NAME-cluster \
            --service $PROJECT_NAME-service \
            --force-new-deployment \
            --region us-east-1

  # ── Job 3: Integration / health check test ────────────────────────────────────
  integration-test:
    name: Integration Health Check
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get ALB DNS name from AWS
        id: alb
        run: |
          ALB_URL=$(aws elbv2 describe-load-balancers \
            --names "$PROJECT_NAME-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text \
            --region us-east-1)
          echo "url=$ALB_URL" >> $GITHUB_OUTPUT
          echo "ALB URL: $ALB_URL"

      - name: Wait for ECS service to stabilise
        run: sleep 60

      - name: Run health check
        run: |
          chmod +x tests/health_check.sh
          ./tests/health_check.sh ${{ steps.alb.outputs.url }}
